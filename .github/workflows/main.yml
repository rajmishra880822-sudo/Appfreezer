name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: temurin
      - name: Build
        run: |
          chmod +x AppFreezer/gradlew
          cd AppFreezer
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: AppFreezer-APK
          path: AppFreezer/app/build/outputs/apk/debug/app-debug.apk
